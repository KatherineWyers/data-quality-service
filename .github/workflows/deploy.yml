name: Data Quality Service CI/CD

on:
  push:
    branches:
      - main
jobs:
  run_pull:
    name: run pull
    runs-on: ubuntu-latest

    steps:
      - name: debug key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | head -1
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tail -1
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | wc -l
      - name: install ssh keys
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts
      - name: connect and pull
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.WORK_DIR }} && git checkout ${{ secrets.MAIN_BRANCH }} && git pull origin ${{ secrets.MAIN_BRANCH }}"
      - name: cleanup
        run: rm -rf ~/.ssh
